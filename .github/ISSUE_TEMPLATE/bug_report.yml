name: Bug report
description: Report something that is not working
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you observed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 124, Safari 17
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14, Windows 11, iOS 17
    validations:
      required: true
  - type: dropdown
    id: signed-in
    attributes:
      label: Signed in
      description: Are you signed in to the app?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
  - type: dropdown
    id: cloud-sync
    attributes:
      label: Cloud sync on
      description: Is cloud sync enabled?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
