name: Bug report
description: Report something that is not working
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What went wrong, and how can we reproduce it?
      placeholder: |
        What I did / what I expected / what actually happened.
    validations:
      required: true
