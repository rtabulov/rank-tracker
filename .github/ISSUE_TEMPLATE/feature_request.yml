name: Feature request
description: Suggest an idea for this project
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: Describe the feature you would like.
    validations:
      required: true
  - type: textarea
    id: why-it-matters
    attributes:
      label: Why it matters
      description: Why would this help you or other players?
    validations:
      required: true
