<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personal Rank Score history for The Finals ranked play." />
    <meta property="og:title" content="Rank Tracker" />
    <meta
      property="og:description"
      content="Personal Rank Score history for The Finals ranked play."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rank.rtabulov.dev/" />
    <meta property="og:image" content="https://rank.rtabulov.dev/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rank Tracker" />
    <meta
      name="twitter:description"
      content="Personal Rank Score history for The Finals ranked play."
    />
    <meta name="twitter:image" content="https://rank.rtabulov.dev/og.png" />
    <meta name="theme-color" content="#f4f4f8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <title>Rank Tracker</title>
    <script>
      try {
        const storageKey = "vite-ui-theme";
        const stored = localStorage.getItem(storageKey);
        const theme =
          stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
        const resolved =
          theme === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : theme;
        document.documentElement.classList.add(resolved);
        let themeColorMeta = document.querySelector('meta[name="theme-color"][data-shell-chrome]');
        if (!themeColorMeta) {
          themeColorMeta = document.createElement("meta");
          themeColorMeta.setAttribute("name", "theme-color");
          themeColorMeta.setAttribute("data-shell-chrome", "");
          document.head.appendChild(themeColorMeta);
        }
        themeColorMeta.setAttribute("content", resolved === "dark" ? "#0a0a0f" : "#f4f4f8");
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
